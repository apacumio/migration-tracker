<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migration Tracker</title>

<style>
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;--text:#1a1a18;--text2:#6b6b67;--text3:#9d9d98;--border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);--blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-bd:#85B7EB;--green-bg:#EAF3DE;--green-text:#3B6D11;--amber-bg:#FAEEDA;--amber-text:#633806;--red-bg:#FCEBEB;--red-text:#A32D2D;--gray-bg:#F1EFE8;--gray-text:#5F5E5A;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0efe9;--text2:#a0a09a;--text3:#6b6b67;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);--blue-bg:#0C447C;--blue-text:#B5D4F4;--green-bg:#27500A;--green-text:#C0DD97;--amber-bg:#633806;--amber-text:#FAC775;--red-bg:#791F1F;--red-text:#F7C1C1;--gray-bg:#444441;--gray-text:#D3D1C7}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:var(--text);background:var(--bg)}
#app{max-width:1400px;margin:0 auto;padding:20px 16px 40px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.topbar h1{font-size:18px;font-weight:500}
.topbar p{font-size:12px;color:var(--text2);margin-top:2px}
.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.stat-val{font-size:22px;font-weight:500;line-height:1}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px}
.pipe-wrap{background:var(--bg2);border-radius:var(--r);padding:10px 14px;margin-bottom:14px}
.pipe-hdr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.bar-track{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;display:flex;gap:2px}
.bar-seg{height:100%;border-radius:2px}
.leg-row{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{padding:7px 16px;cursor:pointer;font-size:12px;white-space:nowrap;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.tab-badge{background:var(--bg2);color:var(--text2);font-size:10px;padding:1px 5px;border-radius:8px;margin-left:4px}
.tab-content{display:none}.tab-content.active{display:block}
.toolbar{display:flex;gap:7px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.toolbar input{flex:1;min-width:140px;height:30px;font-size:12px;padding:0 10px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg);color:var(--text);outline:none}
.toolbar input:focus{border-color:#0078d4}
.fbtn{height:30px;padding:0 10px;font-size:11px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer}
.fbtn.on{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-bd)}
.save-ind{font-size:11px;color:var(--text3);margin-left:auto}
.save-ind.saving{color:#0078d4}.save-ind.saved{color:var(--green-text)}
.tbl{border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.col-hdr{display:grid;grid-template-columns:26px minmax(0,1.6fr) 88px repeat(5,minmax(0,1fr)) minmax(0,1.1fr);background:var(--bg2);border-bottom:.5px solid var(--border)}
.hc{padding:7px 8px;font-size:11px;font-weight:500;color:var(--text2)}
.hc.ctr{text-align:center}
.row-wrap{border-bottom:.5px solid var(--border)}.row-wrap:last-child{border-bottom:none}
.tr-row{display:grid;grid-template-columns:26px minmax(0,1.6fr) 88px repeat(5,minmax(0,1fr)) minmax(0,1.1fr);align-items:center;cursor:pointer;background:var(--bg2)}
.tr-row:hover{background:var(--bg3)}
.tc{padding:8px 8px;font-size:12px}
.chev{font-size:9px;color:var(--text3);transition:transform .15s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.badge-cnt{background:var(--bg);color:var(--text2);font-size:10px;padding:1px 5px;border-radius:8px;margin-left:4px}
.note-chip{font-size:10px;color:var(--amber-text);background:var(--amber-bg);padding:1px 6px;border-radius:3px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.cat-chip{font-size:10px;color:var(--gray-text);background:var(--gray-bg);padding:1px 6px;border-radius:3px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block}
.cust-rows{background:var(--bg)}
.c-row{display:grid;grid-template-columns:26px 26px minmax(0,1.6fr) 88px repeat(5,minmax(0,1fr)) minmax(0,1.1fr);align-items:center;border-bottom:.5px solid var(--border);cursor:pointer}
.c-row:last-child{border-bottom:none}.c-row:hover{background:var(--bg2)}
.cc{padding:7px 8px;font-size:11px}
.task-detail-rows{background:var(--bg);border-top:.5px solid var(--border)}
.td-row{display:grid;grid-template-columns:52px 26px minmax(0,1fr) 110px 110px;align-items:center;border-bottom:.5px solid var(--border);cursor:pointer}
.td-row:hover{background:var(--bg2)}.td-row:last-child{border-bottom:none}
.step-rows{background:var(--bg)}
.step-row{display:grid;grid-template-columns:78px 1fr;align-items:start;border-bottom:.5px solid var(--border);padding:7px 8px 7px 0}
.step-row:last-child{border-bottom:none}
.cbx{width:14px;height:14px;border-radius:3px;border:.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;margin:2px 0 0 28px;transition:background .1s}
.cbx.done{background:#3B6D11;border-color:#3B6D11}
.pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;white-space:nowrap}
.p-done{background:var(--green-bg);color:var(--green-text)}
.p-prog{background:var(--blue-bg);color:var(--blue-text)}
.p-wait{background:var(--gray-bg);color:var(--gray-text)}
.p-dis{background:var(--red-bg);color:var(--red-text)}
.pill-sel{border:none;background:transparent;font-size:10px;font-weight:500;cursor:pointer;padding:0;appearance:none;width:100%}
.pbar-wrap{display:flex;align-items:center;gap:5px}
.pbar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;flex:1;min-width:30px}
.pbar-fill{height:100%;border-radius:2px}
.date-cell{font-size:10px;color:var(--text2)}
.date-cell.overdue{color:var(--red-text);font-weight:500}
.date-cell.soon{color:var(--amber-text);font-weight:500}
input[type=date]{font-size:10px;color:var(--text2);background:transparent;border:none;cursor:pointer;width:90px}
input[type=date]:focus{outline:none;color:var(--text)}
.csm-wrap{display:flex;flex-direction:column;gap:4px}
.csm-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--bg2);padding:2px 7px;border-radius:10px;color:var(--text2)}
.csm-av{width:16px;height:16px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);font-size:8px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
select.csm-sel{font-size:10px;background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:2px 6px;color:var(--text2);cursor:pointer}
.inline-edit{background:transparent;border:none;border-bottom:1px solid var(--border2);font-size:11px;color:var(--text);width:100%;outline:none}
.inline-edit:focus{border-bottom-color:#0078d4}
.cmt-display{font-size:11px;color:var(--text2);background:var(--bg2);padding:3px 8px;border-radius:var(--r);margin-top:3px;cursor:pointer}
.job-link{font-size:10px;color:var(--blue-text);background:var(--blue-bg);padding:1px 6px;border-radius:3px;text-decoration:none}
.step-label{font-size:11px}
.step-label.done{text-decoration:line-through;color:var(--text2)}
</style>
</head>

async function spGet(listId){
  const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${CFG.siteId}/lists/${listId}/items?expand=fields&$top=1000`,{headers:{'Content-Type':'application/json'}});

}
async function spPatch(listId,itemId,fields){

let saveTimer=null;
function scheduleSave(list,id,fields){
  setInd('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await spPatch(CFG.lists[list],id,fields);
      setInd('saved');
    }catch{
      setInd('err');
    }
  },800);
}
function setInd(s){
  const el=document.querySelector('.save-ind');
  const st=document.getElementById('save-time');
  if(el){el.className='save-ind '+s;el.textContent=s==='saving'?'Saving…':s==='saved'?'Saved':'Save failed';}
  if(s==='saved'&&st) st.textContent=new Date().toLocaleTimeString();
}

const T0=new Date('2026-04-02');
function fmt(d){if(!d)return null;return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});}
function dc(d){if(!d)return '';const diff=(new Date(d)-T0)/864e5;return diff<0?'overdue':diff<14?'soon':'';}
function pbc(p){return p===100?'#3B6D11':p>0?'#185FA5':'#B4B2A9';}
function pbar(p,w){return `<div class="pbar-wrap"><div class="pbar" style="width:${w||50}px"><div class="pbar-fill" style="width:${p}%;background:${pbc(p)}"></div></div><span style="font-size:10px;color:var(--text2);min-width:26px">${p}%</span></div>`;}
function pill(s){const m={Complete:'p-done','In progress':'p-prog','Not started':'p-wait',Disabled:'p-dis',Churned:'p-dis'};return `<span class="pill ${m[s]||'p-wait'}">${s}</span>`;}
function csmIn(n){return (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2);}
function csmChip(n){return `<div class="csm-chip"><div class="csm-av">${csmIn(n)}</div>${n}</div>`;}
function getTasks(cid){return S.tasks.filter(t=>t.CustomerId===cid).sort((a,b)=>a.TaskIndex-b.TaskIndex);}
function getCusts(tid){return S.customers.filter(c=>c.TrancheId===tid);}
function custPct(cid){const t=getTasks(cid);return t.length?Math.round(t.reduce((a,x)=>a+x.Pct,0)/t.length):0;}
function tranchePct(tid){const c=getCusts(tid);return c.length?Math.round(c.reduce((a,x)=>a+custPct(x._id),0)/c.length):0;}

const openT=new Set(),openC=new Set(),openTk=new Set();
let activeTab='ngpi';
const tabFilter={ngpi:null,bpa:null,wmap:null,numap:null};
const tabSearch={ngpi:'',bpa:'',wmap:'',numap:''};

function renderAll(){renderStats();renderTabs();}

function renderTabs(){
  document.getElementById('main-tabs').innerHTML=TABS.map(t=>`<div class="tab ${t.key===activeTab?'active':''}" onclick="switchTab('${t.key}')">${t.label}<span class="tab-badge">${t.count}</span></div>`).join('');
  document.getElementById('tab-contents').innerHTML=TABS.map(t=>`<div id="tab-${t.key}" class="tab-content ${t.key===activeTab?'active':''}">${renderPlatform(t.key)}</div>`).join('');
}

function renderPlatform(plat){
  const tranches=S.tranches.filter(t=>t.Platform===plat);
  const q=(tabSearch[plat]||'').toLowerCase();
  const f=tabFilter[plat];
  const filtered=tranches.filter(t=>{
    if(f==='Discovery'&&t.Phase!=='Discovery')return false;
    if(f==='Matching'&&!t.Phase.toLowerCase().includes('match'))return false;
    if(f==='At risk'&&!getCusts(t._id).some(c=>(c.Notes||'').toLowerCase().includes('risk')))return false;
    if(q)return t.Title.toLowerCase().includes(q)||getCusts(t._id).some(c=>c.Title.toLowerCase().includes(q)||(c.CustomerId||'').includes(q));
    return true;
  });
  return `<div class="toolbar">
    <input type="text" placeholder="Search tranches or customers…" value="${tabSearch[plat]||''}" oninput="doSearch(this,'${plat}')">
    <button class="fbtn ${f==='Discovery'?'on':''}" onclick="doFilter(this,'${plat}','Discovery')">Discovery</button>
    <button class="fbtn ${f==='Matching'?'on':''}" onclick="doFilter(this,'${plat}','Matching')">Matching</button>
    <button class="fbtn ${f==='At risk'?'on':''}" onclick="doFilter(this,'${plat}','At risk')">At risk</button>
    <span class="save-ind"></span>
  </div>
  <div class="tbl">
    <div class="col-hdr">
      <div class="hc"></div><div class="hc">Tranche / customer</div><div class="hc ctr">% complete</div>
      <div class="hc ctr">Discovery</div><div class="hc ctr">Crawl append</div><div class="hc ctr">Matching</div>
      <div class="hc ctr">Data quality</div><div class="hc ctr">Monitoring</div><div class="hc">Handoff / CSM</div>
    </div>
    ${filtered.map(t=>renderTranche(t)).join('')}
  </div>`;
}

function renderTranche(tr){
  const open=openT.has(tr._id);
  const pct=tranchePct(tr._id);
  const custs=getCusts(tr._id);
  const summary=TASKS.map((_,ti)=>{
    const ps=custs.map(c=>{const tk=getTasks(c._id)[ti];return tk?tk.Pct:0;});
    const avg=ps.length?Math.round(ps.reduce((a,b)=>a+b,0)/ps.length):0;
    const d=custs.length?(getTasks(custs[0]._id)[ti]?.TargetDate||null):null;
    return{avg,d};
  });
  return `<div class="row-wrap" id="tr-${tr._id}">
    <div class="tr-row" onclick="toggleT('${tr._id}')">
      <div class="tc"><span class="chev ${open?'open':''}" id="cht-${tr._id}">▶</span></div>
      <div class="tc">
        <div style="font-weight:500;font-size:12px;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          ${tr.Title}<span class="badge-cnt">${tr.Customers} customers</span>${tr.Notes?`<span class="note-chip">${tr.Notes}</span>`:''}
        </div>
        <div style="font-size:10px;color:var(--text2);margin-top:2px">Phase: ${tr.Phase} · CSM: ${tr.CSM}</div>
      </div>
      <div class="tc">${pbar(pct,55)}</div>
      ${summary.map(s=>`<div class="tc" style="text-align:center">
        ${pill(s.avg===100?'Complete':s.avg>0?'In progress':'Not started')}
        ${s.avg>0&&s.avg<100?`<div style="margin-top:2px;display:flex;justify-content:center">${pbar(s.avg,36)}</div>`:''}
        ${s.d?`<div class="date-cell ${dc(s.d)}" style="margin-top:2px;text-align:center">${fmt(s.d)}</div>`:''}
      </div>`).join('')}
      <div class="tc"><div class="csm-wrap">
        <div class="date-cell ${dc(tr.GoLive)}">Go-live: ${fmt(tr.GoLive)||'TBD'}</div>
        ${csmChip(tr.CSM)}
      </div></div>
    </div>
    ${open?`<div class="cust-rows" id="custs-${tr._id}">${custs.map(c=>renderCust(c)).join('')}</div>`:''}
  </div>`;
}

    <div class="c-row" onclick="toggleC('${c._id}')">
      <div class="cc"></div>
      <div class="cc"><span class="chev ${open?'open':''}" id="chc-${c._id}">▶</span></div>
      <div class="cc">
        <div style="font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px">
          ${c.Title}${dis?`<span class="pill p-dis" style="font-size:9px">disabled</span>`:''}
        </div>
        <div style="display:flex;gap:5px;align-items:center;margin-top:2px;flex-wrap:wrap">
          ${c.CustomerId?`<span style="font-size:10px;color:var(--text2)">ID: ${c.CustomerId}</span>`:''}
          ${c.Frequency?`<span style="font-size:10px;color:var(--text2)">${c.Frequency}</span>`:''}
          ${c.Notes?`<span class="cat-chip">${c.Notes}</span>`:''}
        </div>
      </div>
      <div class="cc">${pbar(pct,50)}</div>
      ${tasks.map(tk=>`<div class="cc" style="text-align:center">
        ${pill(dis?'Disabled':tk.Status)}
        ${tk.Pct>0&&tk.Pct<100?`<div style="margin-top:2px;display:flex;justify-content:center">${pbar(tk.Pct,34)}</div>`:''}

        <input class="inline-edit" value="${c.CSM||''}" placeholder="Assign CSM…"
          style="font-size:10px;width:100%;margin-top:${c.CSM?'4':'0'}px"
          onclick="event.stopPropagation()"
          onblur="updateCSM('${c._id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">
      </div></div>
    </div>
    ${open?`<div class="task-detail-rows" id="tdr-${c._id}">${tasks.map(tk=>renderTaskRow(c,tk)).join('')}</div>`:''}
  </div>`;
}

function renderTaskRow(c,tk){
  const open=openTk.has(tk._id);
  const steps=JSON.parse(tk.StepsJson||'[]');
  return `<div class="row-wrap" id="tkr-${tk._id}">
    <div class="td-row" onclick="toggleTk('${tk._id}')">
      <div style="padding:6px 4px"></div>
      <div style="padding:6px 4px"><span class="chev ${open?'open':''}" id="chtk-${tk._id}">▶</span></div>
      <div style="padding:6px 8px">
        <div style="font-size:11px;font-weight:500">${tk.TaskName}</div>
        <div style="margin-top:3px">${pbar(tk.Pct,60)}</div>
      </div>
      <div style="padding:6px 8px" onclick="event.stopPropagation()">
        <select class="pill ${tk.Status==='Complete'?'p-done':tk.Status==='In progress'?'p-prog':'p-wait'} pill-sel" onchange="updateStatus('${tk._id}',this.value)">
          <option ${tk.Status==='Not started'?'selected':''}>Not started</option>
          <option ${tk.Status==='In progress'?'selected':''}>In progress</option>
          <option ${tk.Status==='Complete'?'selected':''}>Complete</option>
        </select>
        ${tk.TargetDate?`<div class="date-cell ${dc(tk.TargetDate)}" style="margin-top:2px">${fmt(tk.TargetDate)}</div>`:''}
      </div>
      <div style="padding:6px 8px" onclick="event.stopPropagation()">
        <input type="date" value="${tk.TargetDate||''}" class="date-cell" title="Target date" onchange="updateDate('${tk._id}',this.value)">
      </div>
    </div>
    ${open?renderSteps(c,tk,steps):''}
  </div>`;
}

function renderSteps(c,tk,steps){
  const isTbd=steps.length>0&&steps[0].label.includes('TBD');
  return `<div class="step-rows" id="steps-${tk._id}">
    ${isTbd?`<div style="padding:8px 12px 4px 78px;font-size:11px;color:var(--amber-text);background:var(--amber-bg);border-bottom:.5px solid var(--border)">
      Checklist for this platform is not yet finalized — steps below are placeholders.
    </div>`:''}
    ${steps.map((s,si)=>`<div class="step-row">
      <div style="display:flex;align-items:flex-start">
        <div class="cbx ${s.done?'done':''}" onclick="${isTbd?'':``toggleStep('${tk._id}',${si})``}"
          style="${isTbd?'opacity:0.4;cursor:not-allowed;':''}">${s.done?'✓':''}</div>
      </div>
      <div>
        <div class="step-label ${s.done?'done':''}" style="${isTbd?'color:var(--text3);':''}">
          ${s.label}${isTbd?` <span style="font-size:9px;background:var(--amber-bg);color:var(--amber-text);padding:1px 5px;border-radius:3px;vertical-align:middle">TBD</span>`:''}
        </div>
        ${!isTbd&&si===1&&c.Job?`<div style="margin-top:3px"><a class="job-link" href="${c.JobLink||'#'}" target="_blank">${c.Job}</a></div>`:''}
        ${!isTbd?`<div style="margin-top:4px" onclick="event.stopPropagation()">
          ${s.comment
            ?`<div class="cmt-display" onclick="editCmt('${tk._id}',${si},\`${s.comment.replace(/`/g,"'")}\`)">${s.comment}</div>`
            :`<input class="inline-edit" placeholder="Add comment…" style="font-size:10px;color:var(--text2)" onblur="saveCmt('${tk._id}',${si},this.value)" onkeydown="if(event.key==='Enter')this.blur()">`
          }
        </div>`:''}
      </div>
    </div>`).join('')}
  </div>`;
}

function toggleT(id){openT.has(id)?openT.delete(id):openT.add(id);reTr(id);}
function toggleC(id){openC.has(id)?openC.delete(id):openC.add(id);reCu(id);}
function toggleTk(id){openTk.has(id)?openTk.delete(id):openTk.add(id);reTk(id);}

function toggleStep(tkId,si){
  const tk=S.tasks.find(t=>t._id===tkId);if(!tk)return;
  const steps=JSON.parse(tk.StepsJson||'[]');
  steps[si].done=!steps[si].done;
  tk.StepsJson=JSON.stringify(steps);
  const done=steps.filter(s=>s.done).length;
  tk.Pct=Math.round(done/steps.length*100);
  tk.Status=tk.Pct===100?'Complete':tk.Pct>0?'In progress':'Not started';
  scheduleSave('tasks',tk._id,{StepsJson:tk.StepsJson,Pct:tk.Pct,Status:tk.Status});
  reTk(tkId);reCu(tk.CustomerId);reTr(tk.TrancheId);renderStats();
}
function updateStatus(tkId,val){
  const tk=S.tasks.find(t=>t._id===tkId);if(!tk)return;
  tk.Status=val;tk.Pct=val==='Complete'?100:val==='In progress'?50:0;
  scheduleSave('tasks',tk._id,{Status:val,Pct:tk.Pct});
  reTk(tkId);reCu(tk.CustomerId);reTr(tk.TrancheId);renderStats();
}
function updateDate(tkId,val){const tk=S.tasks.find(t=>t._id===tkId);if(!tk)return;tk.TargetDate=val;scheduleSave('tasks',tk._id,{TargetDate:val});}
function updateCSM(cid,val){
  const c=S.customers.find(x=>x._id===cid);if(!c)return;
  c.CSM=val.trim();
  scheduleSave('customers',c._id,{CSM:c.CSM});
  reCu(cid);
}
function saveCmt(tkId,si,val){if(!val.trim())return;const tk=S.tasks.find(t=>t._id===tkId);if(!tk)return;const steps=JSON.parse(tk.StepsJson||'[]');steps[si].comment=val.trim();tk.StepsJson=JSON.stringify(steps);scheduleSave('tasks',tk._id,{StepsJson:tk.StepsJson});reTk(tkId);}
function editCmt(tkId,si,ex){const tk=S.tasks.find(t=>t._id===tkId);if(!tk)return;const nv=prompt('Edit comment:',ex);if(nv===null)return;const steps=JSON.parse(tk.StepsJson||'[]');steps[si].comment=nv.trim();tk.StepsJson=JSON.stringify(steps);scheduleSave('tasks',tk._id,{StepsJson:tk.StepsJson});reTk(tkId);}

function reTr(id){const el=document.getElementById('tr-'+id);if(!el)return;const tr=S.tranches.find(x=>x._id===id);if(!tr)return;el.outerHTML=renderTranche(tr);}
function reCu(id){const el=document.getElementById('cu-'+id);if(!el)return;const c=S.customers.find(x=>x._id===id);if(!c)return;el.outerHTML=renderCust(c);}
function reTk(id){const el=document.getElementById('tkr-'+id);if(!el)return;const tk=S.tasks.find(t=>t._id===id);if(!tk)return;const c=S.customers.find(x=>x._id===tk.CustomerId);if(!c)return;el.outerHTML=renderTaskRow(c,tk);}

function renderStats(){
  const pcts=S.customers.map(c=>custPct(c._id));
  const done=pcts.filter(p=>p===100).length;
  const inprog=pcts.filter(p=>p>0&&p<100).length;
  const notstart=pcts.filter(p=>p===0).length;
  const avg=pcts.length?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):0;
  const atRisk=S.customers.filter(c=>(c.Notes||'').toLowerCase().includes('risk')||c.Status==='churned').length;
  const total=pcts.length;
  document.getElementById('stat-row').innerHTML=`
    <div class="stat"><div class="stat-label">Overall progress</div><div class="stat-val">${avg}%</div><div class="stat-sub">across all platforms</div></div>
    <div class="stat"><div class="stat-label">Customers complete</div><div class="stat-val">${done}</div><div class="stat-sub">of ${total} total</div></div>
    <div class="stat"><div class="stat-label">In progress</div><div class="stat-val">${inprog}</div><div class="stat-sub">active migrations</div></div>
    <div class="stat"><div class="stat-label">At risk</div><div class="stat-val">${atRisk}</div><div class="stat-sub">renewal or timeline risk</div></div>`;
  const dW=Math.round(done/total*100),pW=Math.round(inprog/total*100),nW=100-dW-pW;
  document.getElementById('pipe-bar').innerHTML=`
    <div class="pipe-hdr"><span style="font-weight:500;font-size:12px">Migration pipeline — all platforms</span><span style="color:var(--text2)">${avg}% complete</span></div>
    <div class="bar-track">
      <div class="bar-seg" style="width:${dW}%;background:#3B6D11"></div>
      <div class="bar-seg" style="width:${pW}%;background:#185FA5"></div>
      <div class="bar-seg" style="width:${nW}%;background:#D3D1C7"></div>
    </div>
    <div class="leg-row">
      <div class="leg"><div class="dot" style="background:#3B6D11"></div>Complete (${done})</div>
      <div class="leg"><div class="dot" style="background:#185FA5"></div>In progress (${inprog})</div>
      <div class="leg"><div class="dot" style="background:#D3D1C7"></div>Not started (${notstart})</div>
    </div>`;
}

function doSearch(el,plat){tabSearch[plat]=el.value;reTab(plat);}
function doFilter(btn,plat,f){const isOn=btn.classList.contains('on');btn.closest('.toolbar').querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));tabFilter[plat]=isOn?null:f;if(!isOn)btn.classList.add('on');reTab(plat);}
function switchTab(key){activeTab=key;renderTabs();}
function reTab(plat){const el=document.getElementById('tab-'+plat);if(el)el.innerHTML=renderPlatform(plat);}

// Auto-load on page open — no login required
loadDemo();
</script>
</body>
</html>
